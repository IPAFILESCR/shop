    <script>
      (function () {
        try {
          var n = navigator, w = window, t = 'mid';
          var conn = n.connection;
          if (conn && conn.saveData) t = 'low';
          else if (conn && conn.effectiveType && /(^|-)2g$|^slow-2g$/.test(conn.effectiveType)) t = 'low';
          else {
            var coarse = w.matchMedia('(pointer: coarse)').matches;
            var noHover = w.matchMedia('(hover: none)').matches;
            var cores = n.hardwareConcurrency || 4;
            var mem = n.deviceMemory;
            if (coarse || noHover) t = (cores <= 4 || (typeof mem === 'number' && mem <= 2)) ? 'low' : 'mid';
            else if (cores >= 8 && (typeof mem !== 'number' || mem >= 4)) t = 'high';
            else if (cores >= 4) t = 'mid';
            else t = 'low';
          }
          document.documentElement.setAttribute('data-perf', t);
        } catch (e) {}
      })();
    </script>
